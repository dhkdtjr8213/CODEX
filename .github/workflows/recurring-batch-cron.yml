name: Recurring Batch Cron

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  run-recurring-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Supabase recurring batch function
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SUPABASE_PROJECT_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: SUPABASE_PROJECT_URL or CRON_SECRET"
            exit 1
          fi

          curl --fail-with-body -X POST \
            "$SUPABASE_PROJECT_URL/functions/v1/run-recurring-batch?limit=200" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json"
